<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovAI Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.7.1/chart.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>NovAI Dashboard</h1>
        <nav>
            <ul>
                <li><a href="#auth">Authentication</a></li>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#charts">Charts</a></li>
                <li><a href="#chat">Chat Interface</a></li>
            </ul>
        </nav>
    </header>

    <section id="auth">
        <h2>Authentication</h2>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>
    </section>

    <section id="dashboard">
        <h2>Dashboard</h2>
        <div id="summary">
            <p>Summary of key metrics will be displayed here.</p>
        </div>
    </section>

    <section id="charts">
        <h2>Charts</h2>
        <canvas id="myChart" width="400" height="200"></canvas>
    </section>

    <section id="chat">
        <h2>Chat Interface</h2>
        <div id="chatBox">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button id="sendButton">Send</button>
        </div>
        <div id="chatHistory">
            <p>Chat history will appear here...</p>
        </div>
    </section>

    <footer>
        <p>© 2026 NovAI. All rights reserved.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.7.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script>
        // Example Chart.js initialization
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
                datasets: [{
                    label: '# of Votes',
                    data: [12, 19, 3, 5, 2, 3],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)',
                        'rgba(75, 192, 192, 0.2)',
                        'rgba(153, 102, 255, 0.2)',
                        'rgba(255, 159, 64, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(153, 102, 255, 1)',
                        'rgba(255, 159, 64, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        // Example send button functionality
        document.getElementById('sendButton').addEventListener('click', function() {
            const userInput = document.getElementById('userInput').value;
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.innerHTML += `<p>You: ${userInput}</p>`;
            document.getElementById('userInput').value = '';
        });
    </script>
</body>
</html>
